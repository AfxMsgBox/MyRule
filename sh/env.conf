# 项目共享环境变量；被 common.sh 与各 init / hotplug 脚本 source。
# 本地覆盖请放到同目录的 env.local.conf（已加入 .gitignore）。

# 本地 HTTP 代理出口；download_file / keeplive 通过它走代理
PROXY_HTTP="${PROXY_HTTP:-http://127.0.0.1:7890}"
# 代理内核外部控制器；update-proxy-rule.sh 通过它刷新订阅与规则集
CORE_API="${CORE_API:-http://127.0.0.1:3721}"
# 内核内置 DNS 端口；与 core/config.yaml 中 dns.listen 保持一致
CORE_DNS_PORT="${CORE_DNS_PORT:-253}"
# fake-ip 网段；与 core/config.yaml 中 dns.fake-ip-range 保持一致
FAKE_IP_CIDR="${FAKE_IP_CIDR:-172.16.0.0/12}"
# 内核工作目录
CORE_DIR="${CORE_DIR:-/etc/proxy/core}"
# 内核可执行文件；换 sing-box 等只改这一处
CORE_BIN="${CORE_BIN:-$CORE_DIR/mihomo}"
# AdGuardHome 工作目录
AGH_DIR="${AGH_DIR:-/etc/proxy/agh}"
# 触发 fake-ip 路由 hotplug 的接口名（空格分隔）；需匹配 core/config.yaml 的 tun.device
TUN_IFACES="${TUN_IFACES:-utun Meta}"
# 仓库 raw 根 URL；迁移仓库或自托管时改这一处
REPO_RAW_URL="${REPO_RAW_URL:-https://raw.githubusercontent.com/AfxMsgBox/MyRule/main}"
# 写入 dns.conf 时排除的伪 TLD（用空格分隔）
EXCLUDE_TLDS="${EXCLUDE_TLDS:-bj}"
# logger -t 用的统一 tag
LOG_TAG="${LOG_TAG:-MyProxy}"

# 同目录下若有 env.local.conf 则加载之，便于本地覆盖以上默认值
# shellcheck disable=SC1091
[ -f "${0%/*}/env.local.conf" ] && . "${0%/*}/env.local.conf"
