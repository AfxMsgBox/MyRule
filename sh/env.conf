# MyProxy 全局变量。所有 caller source 此文件后即可获得：
#   - 全部 MP_* 变量（自动 export，子进程 awk/sed 可通过 ENVIRON 读到）
#   - env.local.conf 中的本地覆盖
#
# 命名约定：MP_* 全大写 = 全局；小写 = 本脚本/共享内部
#
# 变量优先级（高 → 低）：
#   1) 调用方环境变量（MP_CORE_BIN=xxx sh script.sh）
#   2) env.local.conf（敏感参数 / 本机定制）
#   3) 本文件的 ${VAR:-default}（默认值）
#
# 加载顺序：
#   1) 顶部简单标量（全部用 ${VAR:-default}，不覆盖已有环境变量）
#   2) source env.local.conf（可覆盖任何标量，最常见的是 MP_REPO_RAW_URL / MP_USE_PROXY）
#   3) 派生 URL（MP_URL_*）展开 — 跟随上一步覆盖后的 MP_REPO_RAW_URL

set -a

# 自更新策略：true/1/yes 自动把脚本（含 env.conf / common.sh / 自身）刷到最新；
# 默认 true（让 cron / 手动跑都拿到最新版）；开发调试时在 env.local.conf 设 false
MP_AUTOUPDATE="${MP_AUTOUPDATE:-true}"

# 下载是否走本地 HTTP 代理：1/true/yes 启用；其它值（含 0）直连
# 用 ${VAR:-default} 形式让 inst.sh pipe 场景下的 pre-load 不被覆盖
MP_USE_PROXY="${MP_USE_PROXY:-1}"

# 仓库 raw 根（开发分支调试场景在 env.local.conf 改成分支名即可）
# 同样用 ${VAR:-default} 保留 inst.sh pre-load
MP_REPO_RAW_URL="${MP_REPO_RAW_URL:-https://raw.githubusercontent.com/AfxMsgBox/MyRule/main}"

# 网络与端口
MP_PROXY_HTTP="${MP_PROXY_HTTP:-http://127.0.0.1:7890}"
MP_CORE_API="${MP_CORE_API:-http://127.0.0.1:3721}"
MP_CORE_DNS_PORT="${MP_CORE_DNS_PORT:-253}"
MP_FAKE_IP_CIDR="${MP_FAKE_IP_CIDR:-172.16.0.0/12}"


# 脚本安装目录（init.d / hotplug / systemd 里 $0 不可靠，用此变量定位 env.local.conf）
MP_SH_DIR="${MP_SH_DIR:-/etc/proxy/sh}"

# 路径
MP_CORE_DIR="${MP_CORE_DIR:-/etc/proxy/core}"
MP_CORE_BIN="${MP_CORE_BIN:-/etc/proxy/core/mihomo}"
MP_AGH_DIR="${MP_AGH_DIR:-/etc/proxy/agh}"
MP_AGH_BIN="${MP_AGH_BIN:-/usr/bin/AdGuardHome}"

# TUN 接口候选名（空格分隔）
MP_TUN_IFACES="${MP_TUN_IFACES:-utun Meta}"

# 日志统一 tag、写 dns.conf 时排除的伪 TLD
MP_LOG_TAG="${MP_LOG_TAG:-MyProxy}"
MP_EXCLUDE_TLDS="${MP_EXCLUDE_TLDS:-bj}"

# AGH 默认上游 DNS（空格分隔多个）；置空则从 /etc/resolv.conf 取 nameserver
MP_LOCAL_DNS="${MP_LOCAL_DNS:-223.5.5.5 114.114.114.114}"

# 敏感参数（默认空，由 env.local.conf 填写）
MP_SUBSCRIBE_URL="${MP_SUBSCRIBE_URL:-}"
MP_SSHSOS_USER="${MP_SSHSOS_USER:-}"
MP_SSHSOS_PASSWORD="${MP_SSHSOS_PASSWORD:-}"
MP_SSHSOS_SERVER="${MP_SSHSOS_SERVER:-}"
MP_SSHSOS_PORT="${MP_SSHSOS_PORT:-22}"

# 加载本地覆盖
[ -f "$MP_SH_DIR/env.local.conf" ] && . "$MP_SH_DIR/env.local.conf"

# 派生 URL：在 env.local.conf 加载之后展开，让 MP_REPO_RAW_URL 的覆盖生效
MP_URL_ENV_CONF=$MP_REPO_RAW_URL/sh/env.conf
MP_URL_COMMON_SH=$MP_REPO_RAW_URL/sh/common.sh
MP_URL_KEEPLIVE_SH=$MP_REPO_RAW_URL/sh/keeplive.sh
MP_URL_SETUP_FAKE_IP_ROUTE_SH=$MP_REPO_RAW_URL/sh/setup-fake-ip-route.sh
MP_URL_UPDATE_AGH_CONFIG_SH=$MP_REPO_RAW_URL/sh/update-agh-config.sh
MP_URL_UPDATE_ALL_CONFIGS_SH=$MP_REPO_RAW_URL/sh/update-all-configs.sh
MP_URL_UPDATE_ALL_CONFIGS_RESTART_SH=$MP_REPO_RAW_URL/sh/update-all-configs-restart-services.sh
MP_URL_UPDATE_CORE_CONFIG_SH=$MP_REPO_RAW_URL/sh/update-core-config.sh
MP_URL_UPDATE_PROXY_RULE_SH=$MP_REPO_RAW_URL/sh/update-proxy-rule.sh
MP_URL_CORE_CONFIG=$MP_REPO_RAW_URL/core/config.yaml
MP_URL_AGH_MYUPSTREAM=$MP_REPO_RAW_URL/agh/myupstream.txt
MP_URL_DOMAIN_MYPROXYLIST=$MP_REPO_RAW_URL/domain/myproxylist.txt
MP_URL_DOMAIN_GPT=$MP_REPO_RAW_URL/domain/gpt.txt
MP_URL_NOTCN=https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/tld-not-cn.txt
MP_URL_GFWLIST=https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt

set +a
