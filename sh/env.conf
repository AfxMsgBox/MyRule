# MyRule shared environment, sourced by common.sh.
# 本地覆盖请放到同目录的 env.local.conf（被 .gitignore 忽略）。

# 本地代理出口（download_file / keeplive 都通过它）
PROXY_HTTP="${PROXY_HTTP:-http://127.0.0.1:7890}"

# 内核外部控制器（mihomo external-controller）
CORE_API="${CORE_API:-http://127.0.0.1:3721}"

# 内核内置 DNS 端口（fake-ip 出口），需与 core/config.yaml 中 dns.listen 保持一致
CORE_DNS_PORT="${CORE_DNS_PORT:-253}"

# fake-ip 网段，需与 core/config.yaml 中 dns.fake-ip-range 保持一致
FAKE_IP_CIDR="${FAKE_IP_CIDR:-172.16.0.0/12}"

# 内核工作目录与可执行文件
CORE_DIR="${CORE_DIR:-/etc/proxy/core}"
CORE_BIN="${CORE_BIN:-$CORE_DIR/mihomo}"

# AdGuardHome 工作目录
AGH_DIR="${AGH_DIR:-/etc/proxy/agh}"

# 触发 fake-ip 路由 hotplug 的接口名（空格分隔，匹配 core/config.yaml 中 tun.device）
TUN_IFACES="${TUN_IFACES:-utun Meta}"

# 仓库 raw 根 URL，迁移仓库或自托管时改这一处
REPO_RAW_URL="${REPO_RAW_URL:-https://raw.githubusercontent.com/AfxMsgBox/MyRule/main}"

# 写到 dns.conf 的额外排除 TLD（用 | 分隔，进 grep -E 后会匹配 [/<tld>/]）
EXCLUDE_TLDS="${EXCLUDE_TLDS:-bj}"

# logger -t 用的统一 tag
LOG_TAG="${LOG_TAG:-MyRule}"

# 本地覆盖
[ -f "${ENV_LOCAL:-${0%/*}/env.local.conf}" ] && . "${ENV_LOCAL:-${0%/*}/env.local.conf}"
