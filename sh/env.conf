# MyProxy 全局环境变量。所有脚本 source common.sh 时会先 source 本文件，
# 缺失即报错退出。本地覆盖请放到同目录的 env.local.conf（已加入 .gitignore）。
#
# 命名约定：
#   MP_* 全大写  = 全局变量（来自本文件，所有脚本都能读）
#   小写 / _前缀 = 本脚本或 common.sh 内部使用，不写入 env

# === 自更新策略 ===
# 命令行 --noupdate 等价于 MP_NOUPDATE=true。三级优先：
#   1) 命令行 --noupdate 强制 true
#   2) 否则取本变量
#   3) 默认 true（不自更新）
# cron 自动同步场景请在 env.local.conf 设 MP_NOUPDATE=false
MP_NOUPDATE=true

# === 仓库 raw 根 URL ===
MP_REPO_RAW_URL=https://raw.githubusercontent.com/AfxMsgBox/MyRule/main

# === 网络与端口 ===
# 本地 HTTP 代理出口；download_file / keeplive 通过它走代理
MP_PROXY_HTTP=http://127.0.0.1:7890
# 代理内核外部控制器；update-proxy-rule.sh 通过它刷新订阅与规则集
MP_CORE_API=http://127.0.0.1:3721
# 内核内置 DNS 端口；与 core/config.yaml 中 dns.listen 保持一致
MP_CORE_DNS_PORT=253
# fake-ip 网段；与 core/config.yaml 中 dns.fake-ip-range 保持一致
MP_FAKE_IP_CIDR=172.16.0.0/12

# === 路径 ===
# 内核工作目录
MP_CORE_DIR=/etc/proxy/core
# 内核可执行文件；换 sing-box 等只改这一处
MP_CORE_BIN=/etc/proxy/core/mihomo
# AdGuardHome 工作目录
MP_AGH_DIR=/etc/proxy/agh
# AdGuardHome 可执行文件
MP_AGH_BIN=/usr/bin/AdGuardHome

# === TUN 接口候选名（空格分隔），需匹配 core/config.yaml 的 tun.device ===
MP_TUN_IFACES="utun Meta"

# === 日志统一 tag ===
MP_LOG_TAG=MyProxy

# === 写入 dns.conf 时排除的伪 TLD（空格分隔） ===
MP_EXCLUDE_TLDS=bj

# === 各 sh 脚本远程 URL（自更新用） ===
MP_URL_COMMON_SH=$MP_REPO_RAW_URL/sh/common.sh
MP_URL_KEEPLIVE_SH=$MP_REPO_RAW_URL/sh/keeplive.sh
MP_URL_SETUP_FAKE_IP_ROUTE_SH=$MP_REPO_RAW_URL/sh/setup-fake-ip-route.sh
MP_URL_UPDATE_AGH_CONFIG_SH=$MP_REPO_RAW_URL/sh/update-agh-config.sh
MP_URL_UPDATE_ALL_CONFIGS_SH=$MP_REPO_RAW_URL/sh/update-all-configs.sh
MP_URL_UPDATE_ALL_CONFIGS_RESTART_SH=$MP_REPO_RAW_URL/sh/update-all-configs-restart-services.sh
MP_URL_UPDATE_CORE_CONFIG_SH=$MP_REPO_RAW_URL/sh/update-core-config.sh
MP_URL_UPDATE_PROXY_RULE_SH=$MP_REPO_RAW_URL/sh/update-proxy-rule.sh
MP_URL_DOWNLOAD_ALL_SCRIPTS_SH=$MP_REPO_RAW_URL/sh/download-all-scripts.sh

# === 远程模板与清单 URL ===
# core/config.yaml 模板
MP_URL_CORE_CONFIG=$MP_REPO_RAW_URL/core/config.yaml
# 自定义 AGH 上游
MP_URL_AGH_MYUPSTREAM=$MP_REPO_RAW_URL/agh/myupstream.txt
# 自家代理域名清单
MP_URL_DOMAIN_MYPROXYLIST=$MP_REPO_RAW_URL/domain/myproxylist.txt
# GPT / Google 等专用清单
MP_URL_DOMAIN_GPT=$MP_REPO_RAW_URL/domain/gpt.txt
# Loyalsoldier 维护的非中国域名清单
MP_URL_NOTCN=https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/tld-not-cn.txt
# Loyalsoldier 维护的 GFW 清单
MP_URL_GFWLIST=https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
